<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SK Management</title>
    <link rel="icon" href="Image/SK.png" type="image/png" />
    <script>
      const isLoggedIn = localStorage.getItem("skIsLoggedIn") === "true";
      const destination = isLoggedIn
        ? "Sections/Dashboard/dashboard.html"
        : "Sections/Login/login.html";

      window.location.replace(new URL(destination, window.location.href).href);
    </script>
    <style>
      :root {
        --accent: #0038a8;
        --highlight: #fcd116;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(135deg, var(--accent) 0%, #001d5a 100%);
        color: #fff;
      }

      .fallback {
        text-align: center;
        padding: 40px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        backdrop-filter: blur(10px);
      }

      .logo {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #fff;
        padding: 8px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      .subtitle {
        opacity: 0.9;
        font-size: 0.9rem;
        margin-bottom: 20px;
      }

      a {
        color: var(--highlight);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="fallback">
      <img src="Image/SK.png" alt="SK Logo" class="logo" />
      <h1>SK Management</h1>
      <p class="subtitle">Sangguniang Kabataan</p>
      <p>
        Redirecting you now. If it does not happen automatically, continue to
        <a href="Sections/Login/login.html">Login</a>.
      </p>
      <noscript>
        <p>
          JavaScript is disabled. Open
          <a href="Sections/Login/login.html">Login</a> directly.
        </p>
      </noscript>
    </div>
  </body>
</html>
