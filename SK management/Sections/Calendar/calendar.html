<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SK Management Calendar</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="../../Image/Logo.png" type="image/png" />
  </head>
  <body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="../../Image/Logo.png" alt="SK Logo" class="sidebar-logo" />
        <div class="sidebar-brand">
          <span class="brand-title">SK Management</span>
          <span class="brand-subtitle">Sangguniang Kabataan</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="../Dashboard/dashboard.html">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Dashboard</span>
        </a>
        <a class="nav-item" href="../Events/events.html">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          <span>Events</span>
        </a>
        <a class="nav-item active" href="calendar.html">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
          </svg>
          <span>Calendar</span>
        </a>
        <a class="nav-item" href="../OrgChart/orgchart.html">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="5" r="3"/>
            <path d="M12 8v4M6 16a3 3 0 1 0 0-4M18 16a3 3 0 1 1 0-4M6 12h12"/>
          </svg>
          <span>Org Chart</span>
        </a>
        <a class="nav-item" href="../Funds/funds.html">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          <span>Funds</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button type="button" class="logout-btn" id="logoutBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Mobile Header -->
    <header class="mobile-header">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>
      <div class="mobile-brand">
        <img src="../../Image/Logo.png" alt="SK Logo" class="mobile-logo" />
        <span>SK Management</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <div class="page-header-content">
          <h1>Calendar</h1>
          <p>View and track all events and important dates.</p>
        </div>
      </div>

      <div class="calendar-container">
        <div class="calendar-card">
          <div class="calendar-header">
            <button type="button" class="calendar-nav" id="prevMonth">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
              </svg>
            </button>
            <h2 id="calendarMonthYear"></h2>
            <button type="button" class="calendar-nav" id="nextMonth">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18l6-6-6-6"/>
              </svg>
            </button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="events-sidebar">
          <div class="card">
            <div class="card-header">
              <h2>
                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
                <span id="selectedDateLabel">Today</span>
              </h2>
            </div>
            <ul id="selectedDayEvents" class="events-list"></ul>
          </div>
        </div>
      </div>
    </main>

    <!-- Logout Modal -->
    <div class="overlay hidden" id="logoutOverlay">
      <div class="overlay-panel">
        <div class="overlay-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </div>
        <h2>Logged Out</h2>
        <p>You have successfully logged out of SK Management.</p>
        <button type="button" class="btn btn-primary" id="continueBtn">Continue</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
