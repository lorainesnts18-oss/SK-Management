<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SK Management Change Password</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="../../Image/Logo.png" type="image/png" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-panel" aria-label="Change password form">
        <div class="brand">
          <img src="../../Image/Logo.png" alt="SK Logo" class="brand-logo" />
          <div class="brand-text">
            <span class="title">SK Management</span>
            <span class="subtitle">Sangguniang Kabataan</span>
          </div>
        </div>

        <h1>Change Password</h1>
        <p class="subtext">Update your account password securely.</p>

        <form id="changePasswordForm" novalidate>
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            placeholder="Enter your username"
            required
          />

          <label for="currentPassword">Current Password</label>
          <input
            id="currentPassword"
            name="currentPassword"
            type="password"
            autocomplete="current-password"
            placeholder="Enter current password"
            required
          />

          <label for="newPassword">New Password</label>
          <input
            id="newPassword"
            name="newPassword"
            type="password"
            autocomplete="new-password"
            placeholder="Enter new password"
            required
          />

          <label for="confirmNewPassword">Confirm New Password</label>
          <input
            id="confirmNewPassword"
            name="confirmNewPassword"
            type="password"
            autocomplete="new-password"
            placeholder="Re-enter new password"
            required
          />

          <p
            id="feedbackMessage"
            class="feedback-message hidden"
            role="alert"
          ></p>

          <button type="submit" class="primary-button">Update Password</button>
        </form>

        <div class="auth-links">
          <a href="../Login/login.html">Back to Login</a>
          <a href="../Registration/registration.html">Create Account</a>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
