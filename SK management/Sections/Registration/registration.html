<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SK Management Registration</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="../../Image/Logo.png" type="image/png" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-panel" aria-label="Registration form">
        <div class="brand">
          <img src="../../Image/Logo.png" alt="SK Logo" class="brand-logo" />
          <div class="brand-text">
            <span class="title">SK Management</span>
            <span class="subtitle">Sangguniang Kabataan</span>
          </div>
        </div>

        <h1>Create Account</h1>
        <p class="subtext">Register to access the SK Management system.</p>

        <form id="registrationForm" novalidate>
          <label for="fullName">Full Name (optional)</label>
          <input
            id="fullName"
            name="fullName"
            type="text"
            autocomplete="name"
            placeholder="Enter your full name"
          />

          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            placeholder="Choose a username"
            required
          />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="Create a password"
            required
          />

          <label for="confirmPassword">Confirm Password</label>
          <input
            id="confirmPassword"
            name="confirmPassword"
            type="password"
            autocomplete="new-password"
            placeholder="Re-enter your password"
            required
          />

          <p
            id="feedbackMessage"
            class="feedback-message hidden"
            role="alert"
          ></p>

          <button type="submit" class="primary-button">Create Account</button>
        </form>

        <div class="auth-links">
          <a href="../Login/login.html">Back to Login</a>
          <a href="../ChangePassword/changepassword.html">Change Password</a>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
